# Paired JiT recipe preset — the src→tgt x0 translator (ADR-0013/0014). One
# config that selects the full Paired JiT recipe: data src at the t=0 endpoint
# (z_t = t·x_tgt + (1−t)·x_src via add_noise), concat([z_t, x_src]) input with
# summed-label conditioning (embed(src)+embed(tgt)), UNIFORM x0-MSE on x_tgt with
# logit-normal t (the regime fix — see formulation.loss_weight; the legacy
# (1−t)^-2 velocity-MSE collapsed the model to ≈copy-src), the true
# two-evaluation Heun sampler STARTING FROM x_src (deterministic given x_src — no
# CFG, no re-seed), a 10% subject-level held-out val, and double EMA.
# Composed with a BraTS2023 env + the network config (in_channels = 2·C_latent).
#
# Consumed by manifold-train-paired (#69).

diffusion_unet_train:
  batch_size: 8
  cache_rate: 0
  lr: 1.0e-4            # base peak LR at lr_ref_batch_size (auto-scales with the effective batch)
  n_epochs: 1000
  lr_scheduler: cosine
  lr_warmup_steps: 1000
  # Peak-LR auto-scaling by effective batch (per-device batch × world size). The
  # ``lr`` above is the peak AT ``lr_ref_batch_size``; the runtime derives the
  # actual peak (see scaled_peak_lr) so a GPU-count / batch change never needs a
  # hand-retuned LR. At eff==ref the factor is 1.0 → the single-GPU recipe is
  # numerically unchanged.
  lr_ref_batch_size: 8  # effective batch at which ``lr`` is the peak (8 = the single-GPU recipe)
  lr_scale_rule: sqrt   # peak = base_lr × (eff_batch/ref)^(rule) ; sqrt | linear | none
  # lr_warmup_ratio:    # optional: warmup as a fraction of total optimizer steps (overrides lr_warmup_steps)

# The Paired JiT formulation (ADR-0013/0014). Knobs mirror JiT's x0-denoiser;
# each is overridable via CLI/dotlist (e.g. `formulation.p_mean=-1.0`).
formulation:
  mode: paired-x0
  p_mean: -0.8           # t ~ sigmoid(N(p_mean, p_std))
  p_std: 0.8
  t_eps: 0.05            # (1-t)^-2 loss / derived-velocity clamp
  ode_solver: heun       # 2nd-order Heun integrator, starts from x_src
  # UNIFORM x0-MSE, NOT the (1-t)^-2 velocity-MSE (ADR-0013/0014 regime fix). The
  # (1-t)^-2 weight lets the model satisfy high-t by copying z_t (z_t≈x_tgt there)
  # while leaving the low-t transport — which the start-from-x_src rollout depends
  # on — under-trained (predicted velocity 0 → rollout stalls at x_src, ≈ copy-src).
  # On the ep25 run this collapsed the RAW model to ≈copy-src (+0.07 dB); uniform
  # MSE + low-t-biased sampling (p_mean=-0.8) forces genuine low-t translation.
  loss_weight: uniform   # "uniform" | "1mt_sq" (the legacy velocity-MSE default)
  # Double EMA: shadows at 0.9999 (slow, used for the PSNR/SSIM val arm) + 0.9996.
  ema: true
  ema_decays: [0.9999, 0.9996]

# Subject-level held-out validation split. The legacy path reused the train set as
# val (build_datamodule val_dataset=None), so val/psnr was a TRAIN-set number. This
# holds out the last val_fraction of SUBJECTS (disjoint → no leakage; the PSNR/SSIM
# callback then measures held-out translation quality). 0 → val=train fallback.
val_fraction: 0.1

# Pixel-space validation (issue #68): per-epoch 3D PSNR/SSIM on the fixed val
# subset, decoded through the held frozen VAE. Deterministic given x_src
# (ADR-0013) → no per-epoch re-seed (unlike the noise→data FID). All optional —
# manifold-train-paired falls back to sensible defaults; each knob is overridable
# via dotlist (e.g. `paired_eval.num_inference_steps=8`).
paired_eval:
  num_inference_steps: 8   # OPTIMAL, not 15: step-sweep on ep25 SLOW-EMA gives 8>12>15>20
                           # (15=−0.75dB/−0.17SSIM, 20=−2.4dB). Paired is an x_src-anchored
                           # x0-predictor → few Heun steps; unlike noise→data (rflow_jit=15),
                           # more steps diverge on the undertrained high-t velocity field.
  every_n_epochs: 1        # cadence (1 = every validation epoch)
  save_top_k: 3            # top-k checkpoints on the monitored metric
  # Last-epoch-only val (autoresearch "train fully, then val once"): set = n_epochs so
  # Lightning validates ONLY at the final epoch (Trainer.check_val_every_n_epoch), instead
  # of every epoch. null/absent = validate every epoch (the default). When non-null,
  # num_sanity_val_steps=0 is also applied (skip the 2-batch pre-training probe) → exactly
  # one val pass, after all training. The PSNR/SSIM callback then logs a single val/psnr.
  check_val_every_n_epoch: null

# Stock Lightning ModelCheckpoint (ADR-0006). Single-GPU monitors val/psnr
# (mode=max, top-3, last, full state); under DDP (PSNR/SSIM is rank-0-only)
# manifold-train-paired falls back to save_last + every_n_epochs with no monitor.
checkpoint:
  save_top_k: 3
  save_last: true
  every_n_epochs: 1        # DDP fallback cadence (no monitor)

diffusion_unet_inference:
  dim: [256, 256, 128]          # latent target shape [C, D, H, W] (B prepended)
  spacing: [1.7, 1.7, 2]
  top_region_index: [0, 1, 0, 0]
  bottom_region_index: [0, 0, 1, 0]
  random_seed: 0
  num_inference_steps: 8
  modality: 1
  autoencoder_sliding_window_infer_size: [80, 80, 80]
  autoencoder_sliding_window_infer_overlap: 0.4
  autoencoder_encode_sliding_window_infer_size: [320, 320, 160]
  autoencoder_encode_sliding_window_infer_overlap: 0.4
