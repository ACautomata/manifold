# JiT recipe preset — the x0-denoiser Formulation (ADR-0002). One config that
# selects the full JiT recipe: clean-latent (x0) prediction, (1-t)^-2-weighted
# MSE with logit-normal t sampling, the true two-evaluation Heun sampler with
# denoising-interval CFG, and double EMA. Composed with a BraTS2023 env + the
# network config (the architecture and transport are unchanged from velocity
# RFlow — only the prediction target, loss, sampler, and EMA differ).
#
# Consumed by manifold-train (#28).

diffusion_unet_train:
  batch_size: 8
  cache_rate: 0
  lr: 1.0e-4
  n_epochs: 1000
  lr_scheduler: cosine
  lr_warmup_steps: 1000

# The x0-denoiser Formulation (ADR-0002). Knobs are JiT's published values; each
# is overridable via CLI/dotlist (e.g. `formulation.p_mean=-1.0`).
formulation:
  mode: x0-denoiser
  p_mean: -0.8           # t ~ sigmoid(N(p_mean, p_std))
  p_std: 0.8
  t_eps: 0.05            # (1-t)^-2 loss / derived-velocity clamp
  noise_scale: 1.0       # noise-std multiplier on the normalized latent
  cfg_interval: [0.1, 1.0]  # guidance applied only for t in (0.1, 1.0)
  ode_solver: heun       # 2nd-order Heun integrator
  # Double EMA (JiT): shadows at 0.9999 (slow, used for sampling/eval) + 0.9996.
  ema: true
  ema_decays: [0.9999, 0.9996]

# Generative validation (issue #27): per-epoch unbiased 2.5D FID on a fixed
# sample set. All optional — manifold-train falls back to sensible defaults;
# each knob is overridable via dotlist (e.g. `fid_eval.num_synth=32`).
fid_eval:
  num_synth: 16            # unconditional volumes generated per epoch (re-seeded)
  every_n_epochs: 1        # cadence (1 = every validation epoch)
  center_slices_ratio: 0.5 # 2.5D: fraction of each axis's center slices sampled
  cov_ridge: 1.0e-6        # covariance ridge before the Fréchet matrix square root

# Stock Lightning ModelCheckpoint (ADR-0006). Single-GPU monitors val/fid_avg
# (top-3, last, full state); under DDP (FID is rank-0-only) manifold-train falls
# back to save_last + every_n_epochs with no monitor.
checkpoint:
  save_top_k: 3
  save_last: true
  every_n_epochs: 1        # DDP fallback cadence (no monitor)

diffusion_unet_inference:
  dim: [256, 256, 128]          # latent target shape [C, D, H, W] (B prepended)
  spacing: [1.7, 1.7, 2]
  top_region_index: [0, 1, 0, 0]
  bottom_region_index: [0, 0, 1, 0]
  random_seed: 0
  # Heun is 2nd-order (~2 network evals/step), so roughly half the Euler step
  # budget reaches comparable quality.
  num_inference_steps: 15
  modality: 1
  # CFG strength for the denoising-interval (active only inside cfg_interval).
  cfg_guidance_scale: 1.5
  autoencoder_sliding_window_infer_size: [80, 80, 80]
  autoencoder_sliding_window_infer_overlap: 0.4
  autoencoder_encode_sliding_window_infer_size: [320, 320, 160]
  autoencoder_encode_sliding_window_infer_overlap: 0.4
