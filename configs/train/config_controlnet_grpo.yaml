# ControlNet GRPO recipe preset — ADR-0028 Mode-2. Post-trains the supervised
# ControlNet (stage 1, ADR-0027) against the condition-aware paired reward, with
# the base UNet FROZEN (only the ControlNet is optimized). Composed with a
# BraTS2023 env + the network config (latent metadata). The train/val sets carry
# PAIRED conditioning (src_latent / src_label / tgt_label — the ControlNet's
# control signal + translation direction); the rollout samples the group noise.
#
# Consumed by ``manifold-train-grpo --grpo-mode 2``. Selecting Mode-2 on the GRPO
# entry point freezes the base UNet and steers the Granular-GRPO singular-branch
# update of the ControlNet residuals (ADR-0028); Mode-1 (default) trains the UNet
# policy and uses ``config_grpo.yaml``. The same ``--native-dir`` / ``--reward-path``
# / ``--latents-dir`` launch args apply; ``--native-dir`` points at the ControlNet
# native export (the supervised stage's output) which furnishes the base + the
# ControlNet warm-start.

grpo_train:
  batch_size: 2
  # The ControlNet is warm-started from the supervised stage, so GRPO refines at a
  # smaller LR than the from-scratch UNet policy (config_grpo.yaml).
  lr: 1.0e-7
  n_epochs: 50
  # The anchor grid resolution (two-eval Heun steps over t: 0 → 1). Default 15
  # matches the JiT denoiser's production inference count, so the rollout samples
  # the policy at the resolution it deploys at.
  num_steps: 15
  # The group size — transition-rollout siblings sharing one (conditioning, noise)
  # pair, over whose terminal rewards the advantage is normalized.
  G: 8
  # The perturbed step indices (the noisy-half) — one stochastic SDE step off the
  # anchor at each, then a deterministic Heun suffix to the terminal latent.
  eta_step_list: [0, 1, 2, 3, 4, 5, 6, 7]
  # The diffusion scale η (σ_t = η·sqrt((1−t)/t)) — the single exploration knob.
  eta: 0.7
  # The PPO clipped-surrogate ε — tight, so each update is microscopic and stable.
  clip_range: 1.0e-4
  # The advantage-magnitude clip (a single spoofed-reward outlier cannot dominate a step).
  adv_clip_max: 5.0
  # The rollout latent shape (C, D, H, W). GRPO is generative — the Module samples
  # the group noise of this shape; override per dataset.
  latent_shape: [4, 64, 64, 32]
  # v2 anti-reward-hacking knobs (ADR-0015), carried over from the UNet GRPO recipe.
  # kl_coef: β for the equal-variance KL anchor (here the (base, controlnet) pair,
  #   ADR-0015/0028). reward_bound: "tanh" caps the raw logit; reward_temp ≈ reward std.
  kl_coef: 0.1
  reward_bound: "tanh"
  reward_temp: 8.0

# Real-data wiring: the ControlNet warm-start + frozen base load from --native-dir
# (the supervised ControlNet export); the trained RewardModel from --reward-path;
# the paired conditioning + the FID real reference from --latents-dir. The
# RewardModel architecture comes from the network config (``reward_model`` block).
grpo:
  val_fraction: 0.2  # held-out subject fraction (val conditioning + FID real reference).
  modality: 1        # the FID generation recipe's class label (single-modality v1).
  spacing: [1.0, 1.0, 1.0]  # the FID generation recipe's voxel spacing.

# The paired latent target shape + voxel spacing (the BraTS volume the VAE encodes
# each unique contrast of). ``_real_inputs_mode2`` reads ``dim`` for the paired
# cache's target_dim / divisor geometry (it must match the cache the supervised
# stage warmed, ADR-0021/0022); without it the real Mode-2 launch raises
# ConfigAttributeError before loading the cache (codex #151).
diffusion_unet_inference:
  dim: [256, 256, 128]          # volume target shape [D, H, W] (the VAE encodes to latent // divisor)
  spacing: [1.7, 1.7, 2]
  top_region_index: [0, 1, 0, 0]
  bottom_region_index: [0, 0, 1, 0]
  random_seed: 0
  num_inference_steps: 15
  modality: 1
  cfg_guidance_scale: 1.5

# Stock Lightning ModelCheckpoint: monitor val/mean_reward (the progress signal,
# max); #58 switches selection to val/fid (min, the anti-reward-hacking screen)
# when the FID triple is attached. Under DDP the rank-local monitor is dropped.
checkpoint:
  save_top_k: 1
