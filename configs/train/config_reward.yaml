# Reward recipe preset — GRPO reward-model training (online rollout-in-the-loop,
# ADR-0010 / issues #48/#50/#51). Composed with a BraTS2023 env + the network
# config (which carries the `reward_model` block). The train set is a clean-latent
# dataset (the Module rolls fresh preference pairs each step); val + the
# generated-end probe are precomputed once at startup from --native-dir +
# --latents-dir (the frozen JiT denoiser ⇒ static across epochs).
#
# Consumed by manifold-train-reward. The reward job needs no VAE / JiT-UNet
# checkpoint path (the denoiser comes from the native export) — only the output
# model_dir.

reward_train:
  batch_size: 16
  lr: 1.0e-4
  n_epochs: 50
  # Per-step TRAIN Heun step budget — the rollout-cost lever. Default 15 matches
  # the JiT denoiser's production inference count (diffusion_unet_inference.
  # num_inference_steps=15), i.e. the rollout samples the denoiser at the same step
  # resolution the model is used at downstream. For fast iteration override down:
  # num_steps=2 ⇒ 3 Heun evals/step ≈ 0.9 it/s (~3.7 h / 50 epochs, measured on
  # euler); num_steps=4 ⇒ 7 evals ≈ 0.4 it/s. num_steps=4 is what the one-time
  # val/probe precompute (reward.precompute_num_steps) uses.
  num_steps: 15

# Online real-data wiring. The frozen denoiser loads from --native-dir; the clean
# latent cache from --latents-dir. The held-out-SUBJECT split is partitioned once
# (seeded) — the train dataloader serves train subjects only (no leakage).
reward:
  val_fraction: 0.2        # held-out subject fraction (val pairs + probe).
  precompute_num_steps: 4  # one-time val/probe precompute rollout budget (accurate, one-off).
  subject_regex: null      # override the default last-'-<token>' subject-id strip.
  spacing: [1.0, 1.0, 1.0] # fallback voxel spacing (used if cache items lack one).
  modality: 1              # fallback class label (used if cache items lack one).
  gen_batch_size: 4        # one-time val/probe precompute rollout batch size.
  n_probe: 64              # max val latents for the generated-end probe.

# Stock Lightning ModelCheckpoint: monitor val/gen_pair_acc (the GRPO-regime
# metric, max), save top-1 + last. Under DDP the rank-local monitor is dropped
# (save_last + save_top_k=1 keep the latest).
checkpoint:
  save_top_k: 1
