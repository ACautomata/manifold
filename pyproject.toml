[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "manifold"
version = "0.1.0"
description = "Manifold: pretraining & medical imaging experiments built on stable-pretraining and MONAI."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = { text = "MIT" }
authors = [{ name = "Junran" }]
keywords = ["deep-learning", "pretraining", "medical-imaging", "monai", "self-supervised"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
]
dependencies = [
    "stable-pretraining",
    "monai",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[project.urls]
Homepage = "https://github.com/junran/manifold"

[tool.hatch.build.targets.wheel]
packages = ["src/manifold"]

[tool.hatch.build.targets.sdist]
include = ["src", "README.md", "pyproject.toml"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
